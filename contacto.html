<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Escola de Música Municipal de Meaño</title>
    <style>
        /* Variables alineadas con el estilo global de la escuela */
        :root {
            --bg-pink: #FF7894;       /* Rosa base de la web */
            --logo-green: #007872;    /* Verde azulado del logo */
            --logo-pink-dark: #B26767;/* Rosa viejo del logo */
            --text-dark: #333333;
            --text-white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            /* Mantenemos el fondo rosa característico de la escuela */
            background-color: var(--bg-pink);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Ventana de contacto adaptada */
        .tarjeta-contacto {
            background: rgba(255, 255, 255, 0.96);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            /* Línea decorativa superior con el rosa del logo */
            border-top: 8px solid var(--logo-pink-dark); 
        }

        .tarjeta-contacto:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2);
        }

        /* Avatar adaptado a la temática musical utilizando el verde del logo */
        .avatar {
            width: 75px;
            height: 75px;
            background: linear-gradient(135deg, var(--logo-green) 0%, #005a55 100%);
            color: white;
            font-size: 32px;
            font-weight: 700;
            line-height: 75px;
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 8px 20px rgba(0, 120, 114, 0.3);
        }

        h2 {
            color: var(--logo-green); /* Título en verde corporativo */
            margin-bottom: 6px;
            font-size: 26px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .subtitulo {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* Bloques de información adaptados */
        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            background: #fdfdfd;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid #f1f5f9;
            text-align: left;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .info-item:hover {
            background: #f8fafc;
            border-color: #e2e8f0;
        }

        /* Iconos circulares con fondo rosa sutil */
        .icono {
            width: 42px;
            height: 42px;
            background: #ffeef2; /* Fondo rosa muy claro */
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .info-contenido {
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--logo-pink-dark); /* Etiquetas en el rosa oscuro del logo */
            font-weight: 700;
            letter-spacing: 0.8px;
            margin-bottom: 3px;
        }

        .valor {
            font-size: 15px;
            color: #334155;
            font-weight: 600;
            word-break: break-all;
        }

        /* Enlaces usando el verde corporativo */
        a.valor {
            text-decoration: none;
            color: var(--logo-green);
            transition: color 0.2s ease;
        }

        a.valor:hover {
            color: var(--logo-pink-dark);
            text-decoration: underline;
        }

        /* Botón Volver estilizado como los de la web principal */
        .btn-volver {
            display: inline-block;
            margin-top: 25px;
            color: #777;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 22px;
            border-radius: 25px;
            background: #f1f5f9;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .btn-volver:hover {
            background: var(--logo-green);
            color: var(--text-white);
        }
    </style>
</head>
<body>

    <div class="tarjeta-contacto">
        <div class="avatar">🎼</div>
        <h2>Contacto</h2>
        <p class="subtitulo">Escola de Música Municipal de Meaño</p>
        
        <div class="info-item">
            <div class="icono">📍</div>
            <div class="info-contenido">
                <span class="label">Dirección</span>
                <div class="valor">Meaño, Pontevedra (Galicia)</div>
            </div>
        </div>

        <div class="info-item">
            <div class="icono">✉️</div>
            <div class="info-contenido">
                <span class="label">Correo Electrónico</span>
                <a href="mailto:escola.musica@meano.es" class="valor">escola.musica@meano.es</a>
            </div>
        </div>

        <div class="info-item">
            <div class="icono">📱</div>
            <div class="info-contenido">
                <span class="label">Teléfono de Información</span>
                <a href="tel:+34986000000" class="valor">+34 986 000 000</a>
            </div>
        </div>

        <a href="index.html" class="btn-volver">← Volver al inicio</a>
    </div>

</body>
</html>
